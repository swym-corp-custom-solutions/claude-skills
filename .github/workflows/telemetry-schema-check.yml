name: Telemetry Schema Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-telemetry-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify generated telemetry artifacts are up to date
        run: python3 scripts/generate_telemetry_artifacts.py --check

      - name: Validate shell syntax
        run: bash -n telemetry-emit.sh
